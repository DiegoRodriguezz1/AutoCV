name: Deploy Vite to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # 🔥 AQUI ESTA LA MAGIA
      - name: Build project
        run: npm run build
        env:
          VITE_APP_ENV: ${{ secrets.VITE_APP_ENV }}
          VITE_CV_RENDER_API_URL: ${{ secrets.VITE_CV_RENDER_API_URL }}
          VITE_DEFAULT_LOCALE: ${{ secrets.VITE_DEFAULT_LOCALE }}
          VITE_ENABLE_OCR: ${{ secrets.VITE_ENABLE_OCR }}
          VITE_OCR_EXTRACT_CV_API_URL: ${{ secrets.VITE_OCR_EXTRACT_CV_API_URL }}
          VITE_OCR_EXTRACT_CV_PREVIEW_API_URL: ${{ secrets.VITE_OCR_EXTRACT_CV_PREVIEW_API_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
